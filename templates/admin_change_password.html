{% extends "base.html" %}
{% block title %}Change Password — Admin{% endblock %}
{% block content %}
<section style="min-height:88vh;display:flex;align-items:center;padding:140px 0 60px;position:relative;overflow:hidden">
    <div style="position:absolute;width:500px;height:500px;background:radial-gradient(circle, rgba(184,134,11,0.12) 0%, transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card" style="padding:2.75rem;position:relative;z-index:5">
                    <div class="text-center mb-4">
                        <div style="width:60px;height:60px;background:var(--gold);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(184,134,11,0.35)">
                            <i class="fas fa-key" style="font-size:1.5rem;color:white"></i>
                        </div>
                        <h3 style="color:var(--text-primary);font-weight:800;font-family:'Playfair Display',serif">Change Password</h3>
                        <p style="color:var(--text-muted);font-size:0.9rem">Update your admin password</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="changePwForm">
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control" id="current_password" required placeholder="Enter current password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" id="new_password" required minlength="6" placeholder="Min 6 characters">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" required placeholder="Repeat new password">
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg" id="submitBtn" style="justify-content:center">
                            <i class="fas fa-save"></i> Update Password
                        </button>
                        <div class="text-center mt-3">
                            <a href="/admin-dashboard" style="color:var(--text-muted);font-size:0.85rem">← Back to Dashboard</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('changePwForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPw = document.getElementById('new_password').value;
        const confirmPw = document.getElementById('confirm_password').value;
        if (newPw !== confirmPw) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
            return;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Updating...';
        const res = await fetch('/admin-change-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                current_password: document.getElementById('current_password').value,
                new_password: newPw
            })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>Password updated successfully! Please log in again.</div>';
            setTimeout(() => window.location.href = '/admin-logout', 2000);
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i> Update Password';
        }
    });
</script>
{% endblock %}
