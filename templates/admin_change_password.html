{% extends "base.html" %}
{% block title %}Change Password - Admin{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;background:linear-gradient(135deg,#1D3557,#0a0a1a);padding:60px 0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div style="background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:3rem">
                    <div class="text-center mb-4">
                        <div style="width:70px;height:70px;background:linear-gradient(135deg,#FFB703,#ff9500);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 10px 30px rgba(255,183,3,0.4)">
                            <i class="fas fa-key" style="font-size:1.8rem;color:white"></i>
                        </div>
                        <h3 style="color:white;font-weight:800">Change Password</h3>
                        <p style="color:rgba(255,255,255,0.6)">Update your admin password</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="changePwForm">
                        <div class="mb-3">
                            <label class="form-label" style="color:rgba(255,255,255,0.8)">Current Password</label>
                            <input type="password" class="form-control" id="current_password" required
                                style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white"
                                placeholder="Enter current password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="color:rgba(255,255,255,0.8)">New Password</label>
                            <input type="password" class="form-control" id="new_password" required minlength="6"
                                style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white"
                                placeholder="Min 6 characters">
                        </div>
                        <div class="mb-4">
                            <label class="form-label" style="color:rgba(255,255,255,0.8)">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" required
                                style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white"
                                placeholder="Repeat new password">
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg" id="submitBtn">
                            <i class="fas fa-save me-2"></i> Update Password
                        </button>
                        <div class="text-center mt-3">
                            <a href="/admin-dashboard" style="color:rgba(255,255,255,0.5);font-size:0.9rem">← Back to Dashboard</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('changePwForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPw = document.getElementById('new_password').value;
        const confirmPw = document.getElementById('confirm_password').value;
        if (newPw !== confirmPw) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
            return;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Updating...';
        const res = await fetch('/admin-change-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                current_password: document.getElementById('current_password').value,
                new_password: newPw
            })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>Password updated successfully! Please log in again.</div>';
            setTimeout(() => window.location.href = '/admin-logout', 2000);
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i> Update Password';
        }
    });
</script>
{% endblock %}
