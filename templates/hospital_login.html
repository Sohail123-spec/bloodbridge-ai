{% extends "base.html" %}
{% block title %}Hospital Login - BloodBridge AI{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);padding:60px 0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div style="background:rgba(255,255,255,0.95);border-radius:28px;padding:3rem;box-shadow:0 30px 80px rgba(0,0,0,0.12)">
                    <div class="text-center mb-4">
                        <div style="width:70px;height:70px;background:linear-gradient(135deg,#1D3557,#2A9D8F);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
                            <i class="fas fa-hospital" style="font-size:1.8rem;color:white"></i>
                        </div>
                        <h3 style="color:#1D3557;font-weight:800">Hospital Login</h3>
                        <p class="text-muted">Access your hospital portal</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" required placeholder="hospital@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" required placeholder="Enter password">
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg" id="submitBtn">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </form>
                    <hr class="my-4">
                    <div class="text-center">
                        <p class="text-muted mb-0">Not registered? <a href="/hospital-register" style="color:#E63946;font-weight:600">Register Hospital</a></p>
                        <p class="text-muted mt-2 mb-0"><a href="/admin-login" style="color:#1D3557;font-weight:600"><i class="fas fa-shield-alt me-1"></i>Admin Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else { pwd.type = 'password'; icon.className = 'fas fa-eye'; }
    }
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Logging in...';
        const res = await fetch('/hospital-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/hospital-dashboard';
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Login';
        }
    });
</script>
{% endblock %}
