{% extends "base.html" %}
{% block title %}Hospital Login — BloodBridge AI{% endblock %}
{% block extra_css %}
<style>
    .auth-wrap { min-height:88vh; display:flex; align-items:center; padding:140px 0 60px; position:relative; overflow:hidden; }
    .auth-glow { position:absolute; width:500px; height:500px; background:radial-gradient(circle, rgba(15,145,131,0.15) 0%, transparent 70%); top:-100px; left:50%; transform:translateX(-50%); pointer-events:none; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); backdrop-filter:blur(20px); border-radius:var(--radius-xl); padding:2.75rem; position:relative; z-index:5; }
    .auth-icon { width:60px; height:60px; background:linear-gradient(135deg,#1D3557,#0F9183); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
</style>
{% endblock %}
{% block content %}
<section class="auth-wrap">
    <div class="auth-glow"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <div class="auth-icon"><i class="fas fa-hospital" style="font-size:1.5rem;color:white"></i></div>
                        <h3 style="color:var(--text-primary);font-weight:800;font-family:'Playfair Display',serif">Hospital Login</h3>
                        <p style="color:var(--text-muted);font-size:0.9rem">Access your hospital portal</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" required placeholder="hospital@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" required placeholder="Enter password">
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg" id="submitBtn" style="justify-content:center">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    <hr style="border-color:var(--border);margin:1.75rem 0">
                    <div class="text-center">
                        <p style="color:var(--text-muted);font-size:0.875rem" class="mb-0">Not registered? <a href="/hospital-register" style="color:var(--red-bright);font-weight:600">Register Hospital</a></p>
                        <p style="color:var(--text-muted);font-size:0.875rem" class="mt-2 mb-0"><a href="/admin-login" style="color:var(--text-secondary);font-weight:600"><i class="fas fa-shield-alt me-1"></i>Admin Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else { pwd.type = 'password'; icon.className = 'fas fa-eye'; }
    }
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Logging in...';
        const res = await fetch('/hospital-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/hospital-dashboard';
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Login';
        }
    });
</script>
{% endblock %}
