{% extends "base.html" %}
{% block title %}Register Hospital — BloodBridge AI{% endblock %}
{% block extra_css %}
<style>
    .auth-wrap2 { padding:140px 0 80px; position:relative; overflow:hidden; }
    .auth-glow2 { position:absolute; width:500px; height:500px; background:radial-gradient(circle, rgba(15,145,131,0.15) 0%, transparent 70%); top:-100px; left:50%; transform:translateX(-50%); pointer-events:none; }
    .auth-card2 { background:var(--bg-card); border:1px solid var(--border); backdrop-filter:blur(20px); border-radius:var(--radius-xl); padding:2.75rem; position:relative; z-index:5; }
    .auth-icon2 { width:60px; height:60px; background:linear-gradient(135deg,#1D3557,#0F9183); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
</style>
{% endblock %}
{% block content %}
<section class="auth-wrap2">
    <div class="auth-glow2"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="auth-card2">
                    <div class="text-center mb-4">
                        <div class="auth-icon2"><i class="fas fa-hospital-alt" style="font-size:1.5rem;color:white"></i></div>
                        <h3 style="color:var(--text-primary);font-weight:800;font-family:'Playfair Display',serif">Register Your Hospital</h3>
                        <p style="color:var(--text-muted);font-size:0.9rem">Join BloodBridge to manage your donor database</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="registerForm">
                        <div class="row gy-3">
                            <div class="col-12">
                                <label class="form-label">Hospital / Clinic Name *</label>
                                <input type="text" class="form-control" id="name" required placeholder="Full hospital name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address *</label>
                                <input type="email" class="form-control" id="email" required placeholder="hospital@example.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number *</label>
                                <input type="tel" class="form-control" id="phone" required placeholder="+91 9876543210">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">City *</label>
                                <input type="text" class="form-control" id="city" required placeholder="City">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password *</label>
                                <input type="password" class="form-control" id="password" required placeholder="Min 6 characters" minlength="6">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Full Address *</label>
                                <textarea class="form-control" id="address" required rows="2" placeholder="Complete address"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-4" id="submitBtn" style="justify-content:center">
                            <i class="fas fa-hospital"></i> Register Hospital
                        </button>
                        <div class="text-center mt-3">
                            <a href="/hospital-login" style="color:var(--red-bright);font-weight:600;font-size:0.875rem">Already registered? Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Registering...';
        const res = await fetch('/hospital-register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value
            })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>Registration successful! Redirecting to login...</div>';
            setTimeout(() => window.location.href = '/hospital-login', 2000);
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-hospital me-2"></i> Register Hospital';
        }
    });
</script>
{% endblock %}
