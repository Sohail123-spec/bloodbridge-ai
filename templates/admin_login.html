{% extends "base.html" %}
{% block title %}Admin Login — BloodBridge AI{% endblock %}
{% block content %}
<section style="min-height:88vh;display:flex;align-items:center;padding:140px 0 60px;position:relative;overflow:hidden">
    <div style="position:absolute;width:500px;height:500px;background:radial-gradient(circle, rgba(196,30,58,0.15) 0%, transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card" style="padding:2.75rem;position:relative;z-index:5">
                    <div class="text-center mb-4">
                        <div style="width:60px;height:60px;background:var(--red);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:var(--shadow-red)">
                            <i class="fas fa-shield-alt" style="font-size:1.5rem;color:white"></i>
                        </div>
                        <h3 style="color:var(--text-primary);font-weight:800;font-family:'Playfair Display',serif">Admin Panel</h3>
                        <p style="color:var(--text-muted);font-size:0.9rem">Restricted access — authorized only</p>
                    </div>
                    <div id="alert-box"></div>
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label">Admin Email</label>
                            <input type="email" class="form-control" id="email" required placeholder="admin@bloodbridge.ai">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required placeholder="Admin password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg" id="submitBtn" style="justify-content:center">
                            <i class="fas fa-lock"></i> Access Admin Panel
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Authenticating...';
        const res = await fetch('/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/admin-dashboard';
        } else {
            document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock me-2"></i> Access Admin Panel';
        }
    });
</script>
{% endblock %}
