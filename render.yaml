services:
  - type: web
    name: bloodbridge-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///bloodbridge.db
      - key: PYTHON_VERSION
        value: 3.11.0
